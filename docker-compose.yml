version: '3.8'

services:
  # PHP-FPM Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crime-database-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY}
      APP_NAME: ${APP_NAME:-'Crime Database'}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/database/database.sqlite}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    networks:
      - crime-network
    depends_on:
      - nginx

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: crime-database-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/certs:/etc/nginx/certs
    networks:
      - crime-network
    depends_on:
      - app

  # Laravel Queue Worker (Optional - for background jobs)
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crime-database-queue
    restart: unless-stopped
    command: php artisan queue:work
    working_dir: /var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/database/database.sqlite}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
    networks:
      - crime-network
    depends_on:
      - app

networks:
  crime-network:
    driver: bridge
